name: Daily Update Fund Data

on:
  # Schedule: Every day at 19:30 CST (11:30 UTC)
  # A-share market closes at 15:00, data is available after ~19:00
  schedule:
    - cron: '30 11 * * *'
  # Also rebuild & deploy whenever code is pushed to main
  push:
    branches: [main]
  # Manual trigger via GitHub web interface
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    name: Fetch Data & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install tushare pandas requests

      - name: Fetch data from Tushare
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python scripts/update_data.py

      - name: Copy updated data to public
        run: cp src/data/fund_data.json public/fund_data.json

      - name: Commit updated data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/fund_data.json scripts/cache/sector_history.json
          git diff --cached --quiet || git commit -m "data: 自动更新资金数据 $(date +'%Y-%m-%d')"
          git push || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
